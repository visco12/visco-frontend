<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visco compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#080d18;
  --bg2:#5838c3;
  --primary:#8b5cf6;
  --accent:#22d3ee;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

.logo{
  font-size:22px;
  font-weight:700;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.signin{
  padding:8px 18px;
  border-radius:30px;
  background:linear-gradient(135deg,#8b5cf6,#22d3ee);
  cursor:pointer;
}

.hero{
  text-align:center;
  padding:20px;
}

.hero input{
  padding:10px;
  border-radius:20px;
  border:none;
  width:250px;
}

.categories{
  display:flex;
  gap:10px;
  padding:15px;
}

.cat{
  padding:10px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.08);
  white-space:nowrap;
}

.cat:hover{
  background:rgba(34,211,238,0.15);
  border:1px solid rgba(34,211,238,0.3);
  transform:translateY(-2px);
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  padding:12px;
  border-radius:16px;
  text-align:center;
  transition:0.25s ease;
  backdrop-filter: blur(12px);
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.card:hover{
  transform: translateY(-6px);
  border:1px solid rgba(34,211,238,0.4);
  box-shadow:0 10px 30px rgba(34,211,238,0.15);
}
.card{
  cursor:pointer;
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  transition:0.3s;
}

.card img:hover{
  transform: scale(1.05);
}

.btn{
  margin-top:8px;
  padding:9px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:rgba(255,255,255,0.18);
  transform:scale(1.03);
}

.buy{
  margin-top:8px;
  padding:9px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.buy:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.stores-section{
  padding:10px;
}

.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}
  .img-box{
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.img-box img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

.best-badge{
  position:absolute;
  bottom:8px;
  left:8px;
  padding:5px 10px;
  font-size:12px;
  border-radius:10px;
  background:rgba(0,0,0,0.7);
  color:#22d3ee;
  font-weight:600;
  backdrop-filter: blur(6px);
  border:1px solid rgba(34,211,238,0.3);
}
  .best-badge{
  background:linear-gradient(135deg,#22d3ee,#8b5cf6);
  color:black;
}
  .discount-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
  font-size:11px;
  font-weight:700;
  padding:4px 8px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
  .hot-card{
  border:1px solid rgba(34,197,94,0.6);
  box-shadow:0 0 20px rgba(34,197,94,0.3),
             0 0 40px rgba(34,197,94,0.15);
}

.hot-badge{
  position:absolute;
  top:8px;
  left:8px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  font-size:11px;
  font-weight:700;
  padding:4px 8px;
  border-radius:8px;
}
  @keyframes pulseDrop {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(239,68,68,0); }
  50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(239,68,68,0.7); }
  100% { transform: scale(1); box-shadow: 0 0 0 rgba(239,68,68,0); }
}

.price-drop{
  animation: pulseDrop 1s infinite;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">⚡ visco Smart</div>
  <div class="signin" onclick="goLogin()">Sign in</div>
</div>

<div class="hero">
  <h2>Find Best Deals 🚀</h2>
  <input placeholder="Search..." onkeyup="search(this.value)">
</div>

<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('electronics')">📱 Electronics</div>
  <div class="cat" onclick="filter('fashion')">👕 Fashion</div>
</div>

<div class="products" id="products"></div>

<div class="stores-section">
  <h2 style="padding:20px;">🛍️ All Stores</h2>
  <div class="store-grid" id="storeGrid"></div>
</div>

<script>
  function checkLogin(){
  const token = localStorage.getItem("token");
  const signinBtn = document.querySelector(".signin");

  if(token){
    signinBtn.innerText = "Logout";
    signinBtn.onclick = logout;
  } else {
    signinBtn.innerText = "Sign in";
    signinBtn.onclick = goLogin;
  }
}
function goLogin(){
  window.location.href = "index.html";
}
function logout(){
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

let productsData = [];

// STORES
const stores = [
  ["Amazon", "https://www.amazon.in"],
  ["Flipkart", "https://www.flipkart.com"],
  ["Meesho", "https://www.meesho.com"],
  ["Myntra", "https://www.myntra.com"],
  ["Ajio", "https://www.ajio.com"],
  ["Snapdeal", "https://www.snapdeal.com"],
  ["Tata Cliq", "https://www.tatacliq.com"],
  ["Nykaa", "https://www.nykaa.com"],
  ["Croma", "https://www.croma.com"],
  ["Reliance Digital", "https://www.reliancedigital.in"]
];

function loadStores(){
  const grid = document.getElementById("storeGrid");

  grid.innerHTML = stores.map(s => `
    <div class="cat" onclick="window.open('${s[1]}','_blank')">
      🛍️ ${s[0]}
    </div>
  `).join('');
}

// SHOW PRODUCTS
function showProducts(data){
  let container = document.getElementById("products");

  container.innerHTML = data.map((p)=>{

    let amazon = p.amazon || 0;
    let flipkart = p.flipkart || 0;

    // ✅ Best price
    let bestPrice = 0;
    let bestPlatform = "";

    if(amazon && flipkart){
      bestPrice = Math.min(amazon, flipkart);
      bestPlatform = amazon <= flipkart ? "Amazon" : "Flipkart";
    } else if(amazon){
      bestPrice = amazon;
      bestPlatform = "Amazon";
    } else if(flipkart){
      bestPrice = flipkart;
      bestPlatform = "Flipkart";
    }

    // ✅ Max price
    let maxPrice = Math.max(amazon, flipkart);

    // ✅ Discount %
    let discount = 0;
    if(maxPrice > 0 && bestPrice > 0){
      discount = Math.round(((maxPrice - bestPrice) / maxPrice) * 100);
    }

    // ✅ HOT LOGIC (MOVE OUTSIDE HTML)
    let isHot = discount >= 25;

    return `
    <div class="card ${isHot ? "hot-card" : ""}">
      
      <div class="img-box">
        <img src="${p.image}">

        ${isHot ? `<div class="hot-badge">🔥 HOT</div>` : ""}

        <div class="best-badge">
          🏆 ${bestPlatform}
        </div>

        ${
          discount > 20
          ? `<div class="discount-badge price-drop">🔻 ${discount}%</div>`
          : discount > 0
          ? `<div class="discount-badge">-${discount}%</div>`
          : ""
        }

      </div>

      <h4>${p.name}</h4>

      <p style="font-size:13px;opacity:0.7;text-decoration:line-through;">
        ₹${maxPrice}
      </p>

      <p style="color:#22d3ee;font-weight:600;font-size:15px;">
        💰 Best Deal: ₹${bestPrice}
      </p>

      <button class="btn" onclick="compare(${p.id})">Compare</button>
      <button class="buy" onclick="buyBest(${p.id})">Buy</button>

    </div>
    `;
  }).join('');
}
// FILTER
function filter(cat){
  if(cat === "all"){
    showProducts(productsData);
  } else {
    let filtered = productsData.filter(p => p.category === cat);
    showProducts(filtered);
  }
}

// SEARCH
function search(val){
  let filtered = productsData.filter(p =>
    p.name.toLowerCase().includes(val.toLowerCase())
  );
  showProducts(filtered);
}

// COMPARE
function compare(id){
  localStorage.setItem("productId", id);
  window.location.href = "detialspage.html";
}

// BUY BEST
function buyBest(id){
  let product = productsData.find(p => p.id === id);
  if(!product) return;

  let bestLink = (product.amazon < product.flipkart) ? product.amazon_link : product.flipkart_link;
  window.open(bestLink, "_blank");
}

// ✅ MAIN FETCH (FIXED)
async function getProducts() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch("https://visco.onrender.com/products", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (res.status === 401) {
      alert("Login expired");
      localStorage.clear();
      window.location.href = "index.html";
      return;
    }

    let data = await res.json();

    productsData = data.map(p => ({
      ...p,
      amazon: p.amazon || 0,
      flipkart: p.flipkart || 0,
      amazon_link: p.amazon_link || "#",
      flipkart_link: p.flipkart_link || "#"
    }));

    loadStores();
    showProducts(productsData);

  } catch (err) {
    console.log("Backend error:", err);
    document.getElementById("products").innerHTML =
      `<p style="text-align:center;color:#f87171;">⚠️ Backend not running</p>`;
  }
}

// INIT
window.onload = () => {
  checkLogin();
  getProducts();
};

</script>

</body>
</html>
