<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta name="theme-color" content="#8b5cf6">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visco compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ========================
   COLOR SYSTEM
======================== */
:root{
  /* PRIMARY (your color) */
  --primary:#e0b6e4;
  --primary-hover:#d39ad9;   /* slightly deeper for hover */

  /* BACKGROUND SYSTEM */
  --bg:#fefbff;              /* ultra light violet tint */
  --card:#ffffff;
  --soft:#f9f2fb;            /* soft pastel surface */
  --border:#f1e3f3;

  /* ACCENTS */
  --success:#16a34a;
  --danger:#dc2626;

  /* TEXT (important for contrast) */
  --text:#3f2a44;            /* dark violet-gray */
  --muted:#6b7280;
}
/* ========================
   GLOBAL
======================== */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ========================
   TOPBAR
======================== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:white;
  border-bottom:1px solid var(--border);
}

.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:40px;
  height:40px;
  border-radius:10px;
}

.brand-text{
  font-size:20px;
  font-weight:700;
  color:var(--primary);
}

.signin{
  padding:8px 16px;
  border-radius:6px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.signin:hover{
  background:var(--primary-hover);
}

/* ========================
   HERO
======================== */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h2{
  margin-bottom:10px;
}

.hero input{
  padding:14px;
  border-radius:6px;
  border:1px solid var(--border);
  width:260px;
  outline:none;
  background:white;
}

.hero input:focus{
  border:1px solid var(--primary);
  box-shadow:0 0 6px rgba(14,165,183,0.3);
}

/* ========================
   CATEGORIES
======================== */
.categories{
  display:flex;
  gap:10px;
  padding:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.cat{
  padding:8px 14px;
  border-radius:20px;
  background:var(--soft);
  cursor:pointer;
  border:1px solid var(--border);
  transition:0.2s;
}

.cat:hover{
  background:var(--primary);
  color:white;
}

/* ========================
   PRODUCTS GRID
======================== */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:30px;
}

/* ========================
   CARD
======================== */
.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.25s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 8px 20px rgba(14,165,183,0.12);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
}

.card img:hover{
  transform:scale(1.04);
}

/* ========================
   BADGES
======================== */
.img-box{
  position:relative;
}

.best-badge{
  position:absolute;
  bottom:8px;
  left:8px;
  background:var(--primary);
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
}

.discount-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:var(--danger);
  color:white;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
}

.hot-badge{
  position:absolute;
  top:8px;
  left:8px;
  background:var(--green);
  color:white;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
}

/* ========================
   TEXT
======================== */
.card h4{
  font-size:14px;
  margin-top:10px;
  line-height:1.4;
}

.old-price{
  text-decoration:line-through;
  color:#9ca3af;
  font-size:12px;
}

.best-price{
  color:var(--primary);
  font-weight:700;
  font-size:16px;
}

/* SAVINGS */
.saving{
  color:var(--green);
  font-size:12px;
  font-weight:600;
}

/* ========================
   BUTTONS
======================== */
.btn{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:var(--soft);
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:#eae4dc;
}

.buy{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:linear-gradient(135deg,var(--primary),var(--primary-hover));
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.buy:hover{
  box-shadow:0 0 10px rgba(14,165,183,0.35);
}

/* ========================
   STORES
======================== */
.stores-section{
  background:var(--soft);
}

.stores-section h2{
  padding:20px;
}

.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:20px;
}

/* ========================
   MOBILE
======================== */
@media(max-width:600px){

  .hero h2{
    font-size:20px;
  }

  .hero input{
    width:180px;
  }

  .products{
    grid-template-columns:repeat(2,1fr);
    padding:15px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-box">
  <img src="/logo.png" class="logo-img">
  <span class="brand-text">Visco Compare</span>
</div>
  <div class="signin" onclick="goLogin()">Sign in</div>
</div>

<div class="hero">
  <h2>Find Best Deals 🚀</h2>
  <input placeholder="Search..." onkeyup="search(this.value)">
</div>

<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('electronics')">📱 Electronics</div>
  <div class="cat" onclick="filter('fashion')">👕 Fashion</div>
</div>

<div class="products" id="products"></div>

<div class="stores-section">
  <h2 style="padding:20px;">🛍️ All Stores</h2>
  <div class="store-grid" id="storeGrid"></div>
</div>

<script>
  function checkLogin(){
  const token = localStorage.getItem("token");
  const signinBtn = document.querySelector(".signin");

  if(token){
    signinBtn.innerText = "Logout";
    signinBtn.onclick = logout;
  } else {
    signinBtn.innerText = "Sign in";
    signinBtn.onclick = goLogin;
  }
}
function goLogin(){
  window.location.href = "index.html";
}
function logout(){
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

let productsData = [];

// STORES
const stores = [
  ["Amazon", "https://www.amazon.in"],
  ["Flipkart", "https://www.flipkart.com"],
  ["Meesho", "https://www.meesho.com"],
  ["Myntra", "https://www.myntra.com"],
  ["Ajio", "https://www.ajio.com"],
  ["Snapdeal", "https://www.snapdeal.com"],
  ["Tata Cliq", "https://www.tatacliq.com"],
  ["Nykaa", "https://www.nykaa.com"],
  ["Croma", "https://www.croma.com"],
  ["Reliance Digital", "https://www.reliancedigital.in"]
];

function loadStores(){
  const grid = document.getElementById("storeGrid");

  grid.innerHTML = stores.map(s => `
    <div class="cat" onclick="window.open('${s[1]}','_blank')">
      🛍️ ${s[0]}
    </div>
  `).join('');
}

// SHOW PRODUCTS
function showProducts(data){
  let container = document.getElementById("products");

  container.innerHTML = data.map((p)=>{

    let amazon = p.amazon || 0;
    let flipkart = p.flipkart || 0;

    // ✅ Best price
    let bestPrice = 0;
    let bestPlatform = "";

    if(amazon && flipkart){
      bestPrice = Math.min(amazon, flipkart);
      bestPlatform = amazon <= flipkart ? "Amazon" : "Flipkart";
    } else if(amazon){
      bestPrice = amazon;
      bestPlatform = "Amazon";
    } else if(flipkart){
      bestPrice = flipkart;
      bestPlatform = "Flipkart";
    }

    // ✅ Max price
    let maxPrice = Math.max(amazon, flipkart);

    // ✅ Discount %
    let discount = 0;
    if(maxPrice > 0 && bestPrice > 0){
      discount = Math.round(((maxPrice - bestPrice) / maxPrice) * 100);
    }

    // ✅ HOT LOGIC (MOVE OUTSIDE HTML)
    let isHot = discount >= 25;

    return `
    <div class="card ${isHot ? "hot-card" : ""}">
      
      <div class="img-box">
        <img src="${p.image}">

        ${isHot ? `<div class="hot-badge">🔥 HOT</div>` : ""}

        <div class="best-badge">
          🏆 ${bestPlatform}
        </div>

        ${
          discount > 20
          ? `<div class="discount-badge price-drop">🔻 ${discount}%</div>`
          : discount > 0
          ? `<div class="discount-badge">-${discount}%</div>`
          : ""
        }

      </div>

      <h4>${p.name}</h4>

      <p style="font-size:13px;opacity:0.7;text-decoration:line-through;">
        ₹${maxPrice}
      </p>

      <p style="color:#22d3ee;font-weight:600;font-size:15px;">
        💰 Best Deal: ₹${bestPrice}
      </p>

      <button class="btn" onclick="compare(${p.id})">Compare</button>
      <button class="buy" onclick="buyBest(${p.id})">Buy</button>

    </div>
    `;
  }).join('');
}
// FILTER
function filter(cat){
  if(cat === "all"){
    showProducts(productsData);
  } else {
    let filtered = productsData.filter(p => p.category === cat);
    showProducts(filtered);
  }
}

// SEARCH
function search(val){
  let filtered = productsData.filter(p =>
    p.name.toLowerCase().includes(val.toLowerCase())
  );
  showProducts(filtered);
}

// COMPARE
function compare(id){
  localStorage.setItem("productId", id);
  window.location.href = "detialspage.html";
}

// BUY BEST
function buyBest(id){
  let product = productsData.find(p => p.id === id);
  if(!product) return;

  let bestLink = (product.amazon < product.flipkart) ? product.amazon_link : product.flipkart_link;
  window.open(bestLink, "_blank");
}

// ✅ MAIN FETCH (FIXED)
async function getProducts() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch("https://visco.onrender.com/products", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (res.status === 401) {
      alert("Login expired");
      localStorage.clear();
      window.location.href = "index.html";
      return;
    }

    let data = await res.json();

    productsData = data.map(p => ({
      ...p,
      amazon: p.amazon || 0,
      flipkart: p.flipkart || 0,
      amazon_link: p.amazon_link || "#",
      flipkart_link: p.flipkart_link || "#"
    }));

    loadStores();
    showProducts(productsData);

  } catch (err) {
    console.log("Backend error:", err);
    document.getElementById("products").innerHTML =
      `<p style="text-align:center;color:#f87171;">⚠️ Backend not running</p>`;
  }
}

// INIT
window.onload = () => {
  checkLogin();
  getProducts();
};

</script>

</body>
</html>
