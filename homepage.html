<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visco compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#080d18;
  --bg2:#5838c3;
  --primary:#8b5cf6;
  --accent:#22d3ee;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

.logo{
  font-size:22px;
  font-weight:700;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.signin{
  padding:8px 18px;
  border-radius:30px;
  background:linear-gradient(135deg,#8b5cf6,#22d3ee);
  cursor:pointer;
}

.hero{
  text-align:center;
  padding:20px;
}

.hero input{
  padding:10px;
  border-radius:20px;
  border:none;
  width:250px;
}

.categories{
  display:flex;
  gap:10px;
  padding:15px;
}

.cat{
  padding:8px 15px;
  border-radius:20px;
  background:var(--glass);
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:var(--glass);
  padding:10px;
  border-radius:15px;
  text-align:center;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:15px;
  background:#101318;
  color:white;
  cursor:pointer;
}

.buy{
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:15px;
  background:#4ade80;
  cursor:pointer;
}

.stores-section{
  padding:10px;
}

.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">⚡ visco Smart</div>
  <div class="signin" onclick="goLogin()">Sign in</div>
</div>

<div class="hero">
  <h2>Find Best Deals 🚀</h2>
  <input placeholder="Search..." onkeyup="search(this.value)">
</div>

<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('electronics')">📱 Electronics</div>
  <div class="cat" onclick="filter('fashion')">👕 Fashion</div>
</div>

<div class="products" id="products"></div>

<div class="stores-section">
  <h2 style="padding:20px;">🛍️ All Stores</h2>
  <div class="store-grid" id="storeGrid"></div>
</div>

<script>
  function checkLogin(){
  const token = localStorage.getItem("token");
  const signinBtn = document.querySelector(".signin");

  if(token){
    signinBtn.innerText = "Logout";
    signinBtn.onclick = logout;
  } else {
    signinBtn.innerText = "Sign in";
    signinBtn.onclick = goLogin;
  }
}
function goLogin(){
  window.location.href = "index.html";
}
function logout(){
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

let productsData = [];

// STORES
const stores = [
  ["Amazon", "https://www.amazon.in"],
  ["Flipkart", "https://www.flipkart.com"],
  ["Meesho", "https://www.meesho.com"],
  ["Myntra", "https://www.myntra.com"],
  ["Ajio", "https://www.ajio.com"],
  ["Snapdeal", "https://www.snapdeal.com"],
  ["Tata Cliq", "https://www.tatacliq.com"],
  ["Nykaa", "https://www.nykaa.com"],
  ["Croma", "https://www.croma.com"],
  ["Reliance Digital", "https://www.reliancedigital.in"]
];

function loadStores(){
  const grid = document.getElementById("storeGrid");

  grid.innerHTML = stores.map(s => `
    <div class="cat" onclick="window.open('${s[1]}','_blank')">
      🛍️ ${s[0]}
    </div>
  `).join('');
}

// SHOW PRODUCTS
function showProducts(data){
  let container = document.getElementById("products");

  container.innerHTML = data.map((p)=>{
    let bestPrice = Math.min(p.amazon, p.flipkart);
    return `
    <div class="card">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>Best Price: ₹${bestPrice}</p>
      <button class="btn" onclick="compare(${p.id})">Compare</button>
      <button class="buy" onclick="buyBest(${p.id})">Buy</button>
    </div>
    `;
  }).join('');
}

// FILTER
function filter(cat){
  if(cat === "all"){
    showProducts(productsData);
  } else {
    let filtered = productsData.filter(p => p.category === cat);
    showProducts(filtered);
  }
}

// SEARCH
function search(val){
  let filtered = productsData.filter(p =>
    p.name.toLowerCase().includes(val.toLowerCase())
  );
  showProducts(filtered);
}

// COMPARE
function compare(id){
  localStorage.setItem("productId", id);
  window.location.href = "detialspage.html";
}

// BUY BEST
function buyBest(id){
  let product = productsData.find(p => p.id === id);
  if(!product) return;

  let bestLink = (product.amazon < product.flipkart) ? product.amazon_link : product.flipkart_link;
  window.open(bestLink, "_blank");
}

// ✅ MAIN FETCH (FIXED)
async function getProducts() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch("https://visco.onrender.com/products", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (res.status === 401) {
      alert("Login expired");
      localStorage.clear();
      window.location.href = "index.html";
      return;
    }

    let data = await res.json();

    productsData = data.map(p => ({
      ...p,
      amazon: p.amazon || 0,
      flipkart: p.flipkart || 0,
      amazon_link: p.amazon_link || "#",
      flipkart_link: p.flipkart_link || "#"
    }));

    loadStores();
    showProducts(productsData);

  } catch (err) {
    console.log("Backend error:", err);
    document.getElementById("products").innerHTML =
      `<p style="text-align:center;color:#f87171;">⚠️ Backend not running</p>`;
  }
}

// INIT
window.onload = () => {
  checkLogin();
  getProducts();
};

</script>

</body>
</html>
