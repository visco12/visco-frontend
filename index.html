<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Visco Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#080d18,#5838c3);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
  flex-direction:column;
}

header{
  position:absolute;
  top:15px;
  left:30px;
}

.login-container{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation: floatUp 0.6s ease;
  transition:0.3s;
}

.login-container:hover{
  transform:translateY(-3px);
}

@keyframes floatUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:40px;
  height:40px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(139,92,246,0.7);
}

.brand-text{
  font-size:20px;
  font-weight:700;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h1{ text-align:center; margin-bottom:30px; }

.form-group{ margin-bottom:15px; }

.form-group input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
}

.form-group input:focus{
  outline:none;
  border:1px solid #22d3ee;
  box-shadow:0 0 10px rgba(34,211,238,0.3);
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#8b5cf6,#22d3ee);
  color:black;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

.login-btn:disabled{
  opacity:0.6;
}
</style>
</head>

<body>

<header>
 <div class="logo-box">
  <img src="/logo.png" class="logo-img">
  <span class="brand-text">Visco Compare</span>
</div>
</header>

<main>
<div class="login-container">

<div style="text-align:center; margin-bottom:15px;">
  <img src="/logo.png" style="width:60px; border-radius:14px; box-shadow:0 0 20px rgba(139,92,246,0.6);">
</div>

<h1>Login</h1>

<form id="loginForm">
  <div class="form-group">
    <input type="text" id="phone" placeholder="+91XXXXXXXXXX" required>
  </div>

  <div class="form-group">
    <input type="password" id="password" placeholder="Password" required>
  </div>

  <button type="submit" class="login-btn" id="loginBtn">Login</button>
</form>

<button onclick="signup()" class="login-btn">Create Account</button>

</div>
</main>

<script>

const API = "https://visco.onrender.com";

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Logging in...";

  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  try{
    const res = await fetch(API + "/login-phone", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ phone, password })
    });

    const data = await res.json();

    if(res.ok && data.token){
      localStorage.setItem("token", data.token);
      window.location.replace("homepage.html");
    } else {
      alert(data.error || "Invalid login");
    }

  }catch(err){
    alert("Server error");
  }

  btn.disabled = false;
  btn.innerText = "Login";
});

// TOAST
function toast(msg){
  const t = document.createElement("div");
  t.innerText = msg;
  t.style.position="fixed";
  t.style.bottom="20px";
  t.style.left="50%";
  t.style.transform="translateX(-50%)";
  t.style.background="rgba(0,0,0,0.8)";
  t.style.color="white";
  t.style.padding="10px 20px";
  t.style.borderRadius="10px";
  t.style.zIndex="9999";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// SIGNUP
async function signup(){
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const name = prompt("Enter your name");

  if(!phone || !password || !name){
    alert("Fill all fields");
    return;
  }

  try{
    const res = await fetch(API + "/signup-phone", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, phone, password })
    });

    const data = await res.json();

    if(res.ok){
      toast("Signup successful 🚀 Now login");
    } else {
      alert(data.error || "Signup failed");
    }

  }catch(err){
    alert("Server error");
  }
}

</script>

</body>
</html>
