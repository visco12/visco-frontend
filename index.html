<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Visco Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --primary:#3ecf8e;
  --primary-hover:#2eb67d;

  --bg:#f8faf9;
  --card:#ffffff;

  --text:#111827;
  --muted:#6b7280;

  --border:#d1fae5;

}

/* =========================
   BODY
========================= */

body{
  font-family:'Poppins',sans-serif;

  background:linear-gradient(
    180deg,
    #ffffff 0%,
    #f0fdf4 100%
  );

  color:var(--text);

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
  position:relative;
}

/* GLOW EFFECTS */

body::before{
  content:"";
  position:absolute;

  width:500px;
  height:500px;

  background:rgba(62,207,142,0.12);

  filter:blur(120px);

  top:-200px;
  right:-150px;

  border-radius:50%;
}

body::after{
  content:"";
  position:absolute;

  width:400px;
  height:400px;

  background:rgba(62,207,142,0.08);

  filter:blur(120px);

  bottom:-180px;
  left:-150px;

  border-radius:50%;
}

/* =========================
   LOGIN BOX
========================= */

.login-container{

  width:100%;
  max-width:430px;

  background:rgba(255,255,255,0.88);

  border:1px solid var(--border);

  border-radius:30px;

  padding:42px;

  position:relative;
  z-index:2;

  backdrop-filter:blur(18px);

  box-shadow:
    0 10px 40px rgba(62,207,142,0.10),
    0 2px 10px rgba(0,0,0,0.04);

  transition:0.25s;
}

.login-container:hover{
  transform:translateY(-4px);

  box-shadow:
    0 20px 50px rgba(62,207,142,0.14),
    0 4px 15px rgba(0,0,0,0.06);
}

/* =========================
   LOGO
========================= */

.logo-area{
  text-align:center;
  margin-bottom:26px;
}

.logo-area img{

  width:95px;
  height:95px;

  object-fit:contain;

  border-radius:24px;

  background:white;

  padding:8px;

  box-shadow:
    0 10px 30px rgba(62,207,142,0.18);
}

.brand{
  margin-top:14px;

  font-size:30px;
  font-weight:700;

  color:var(--primary);
}

/* =========================
   HEADING
========================= */

h1{
  text-align:center;

  font-size:34px;

  margin-bottom:10px;

  color:var(--text);
}

.sub{
  text-align:center;

  color:var(--muted);

  font-size:14px;

  line-height:1.8;

  margin-bottom:34px;
}

/* =========================
   INPUTS
========================= */

.form-group{
  margin-bottom:16px;
}

.input-box{
  position:relative;
}

.input-box input{

  width:100%;

  padding:16px 18px;

  border-radius:16px;

  border:1px solid var(--border);

  background:white;

  color:var(--text);

  font-size:15px;

  transition:0.25s;
}

.input-box input:focus{

  outline:none;

  border:1px solid var(--primary);

  box-shadow:
    0 0 0 4px rgba(62,207,142,0.12);
}

.input-box input::placeholder{
  color:#9ca3af;
}

/* =========================
   BUTTONS
========================= */

.login-btn{

  width:100%;

  padding:15px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
    135deg,
    #3ecf8e,
    #2eb67d
  );

  color:white;

  font-size:15px;
  font-weight:600;

  cursor:pointer;

  transition:0.25s;

  margin-top:10px;

  box-shadow:
    0 10px 25px rgba(62,207,142,0.22);
}

.login-btn:hover{

  transform:translateY(-2px);

  background:linear-gradient(
    135deg,
    #34d399,
    #22c55e
  );
}

.login-btn:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

/* GUEST BUTTON */

.guest-btn{

  background:white;

  color:var(--primary);

  border:1px solid var(--border);

  box-shadow:none;
}

.guest-btn:hover{
  background:#f0fdf4;
}

/* =========================
   DIVIDER
========================= */

.divider{

  display:flex;
  align-items:center;

  gap:12px;

  margin:24px 0;
}

.divider::before,
.divider::after{

  content:"";

  flex:1;

  height:1px;

  background:#e5e7eb;
}

.divider span{

  color:#9ca3af;

  font-size:13px;
}

/* =========================
   FOOTER
========================= */

.footer-text{

  margin-top:22px;

  text-align:center;

  font-size:13px;

  color:#6b7280;

  line-height:1.8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  body{
    padding:18px;
  }

  .login-container{
    padding:30px 24px;
    border-radius:24px;
  }

  h1{
    font-size:28px;
  }

  .brand{
    font-size:24px;
  }

}

</style>
</head>

<body>

<div class="login-container">

  <!-- LOGO -->

  <div class="logo-area">

    <img src="logo.png" alt="Visco Logo">

    <div class="brand">
      Visco Compare
    </div>

  </div>

  <!-- HEADING -->

  <h1>Welcome Back</h1>

  <div class="sub">
    Login to compare prices across all
    your favorite shopping platforms.
  </div>

  <!-- FORM -->

  <form id="loginForm">

    <div class="form-group">
      <div class="input-box">
        <input
          type="text"
          id="name"
          placeholder="Your Name"
        />
      </div>
    </div>

    <div class="form-group">
      <div class="input-box">
        <input
          type="text"
          id="phone"
          placeholder="+91XXXXXXXXXX"
          required
        />
      </div>
    </div>

    <div class="form-group">
      <div class="input-box">
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        />
      </div>
    </div>

    <button
      type="submit"
      class="login-btn"
      id="loginBtn"
    >
      Login
    </button>

  </form>

  <!-- DIVIDER -->

  <div class="divider">
    <span>OR</span>
  </div>

  <!-- SIGNUP -->

  <button
    onclick="signup()"
    class="login-btn"
  >
    Create Account
  </button>

  <!-- GUEST -->

  <button
    onclick="guestMode()"
    class="login-btn guest-btn"
  >
    Continue as Guest
  </button>

  <!-- FOOTER -->

  <div class="footer-text">
    Smart shopping starts here ⚡
  </div>

</div>

<script>

const API = "https://visco.onrender.com";

// LOGIN

document
.getElementById("loginForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const btn =
    document.getElementById("loginBtn");

  btn.disabled = true;
  btn.innerText = "Logging in...";

  const phone =
    document.getElementById("phone")
    .value.trim();

  const password =
    document.getElementById("password")
    .value.trim();

  try{

    const res = await fetch(
      API + "/login-phone",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          phone,
          password
        })
      }
    );

    const data = await res.json();

    if(res.ok && data.token){

      localStorage.setItem(
        "token",
        data.token
      );

      localStorage.removeItem("guest");

      window.location.replace(
        "homepage.html"
      );

    }else{
      toast(data.error || "Login failed");
    }

  }catch(err){

    toast("Server error");

  }

  btn.disabled = false;
  btn.innerText = "Login";

});

// SIGNUP

async function signup(){

  const name =
    document.getElementById("name")
    .value.trim();

  const phone =
    document.getElementById("phone")
    .value.trim();

  const password =
    document.getElementById("password")
    .value.trim();

  if(!name || !phone || !password){

    toast("Fill all fields");

    return;
  }

  try{

    const res = await fetch(
      API + "/signup-phone",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          name,
          phone,
          password
        })
      }
    );

    const data = await res.json();

    if(res.ok){

      toast("Signup successful 🚀");

    }else{

      toast(
        data.error || "Signup failed"
      );

    }

  }catch(err){

    toast("Server error");

  }

}

// GUEST

function guestMode(){

  localStorage.setItem(
    "guest",
    "true"
  );

  localStorage.removeItem("token");

  toast("Entering guest mode 🚀");

  setTimeout(()=>{

    window.location.replace(
      "homepage.html"
    );

  },800);

}

// TOAST

function toast(msg){

  const t =
    document.createElement("div");

  t.innerText = msg;

  t.style.position = "fixed";
  t.style.bottom = "25px";
  t.style.left = "50%";
  t.style.transform = "translateX(-50%)";

  t.style.background = "white";

  t.style.border =
    "1px solid rgba(62,207,142,0.25)";

  t.style.color = "#111827";

  t.style.padding =
    "14px 22px";

  t.style.borderRadius = "14px";

  t.style.zIndex = "9999";

  t.style.boxShadow =
    "0 10px 30px rgba(62,207,142,0.10)";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),2200);

}

</script>

</body>
</html>
