<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Visco Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{

  --primary:#3ecf8e;
  --primary-dark:#2eb67d;

  --bg:#f8faf9;
  --card:#ffffff;

  --text:#111827;
  --muted:#6b7280;

  --border:#e5e7eb;

}

/* BODY */

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

/* GLOW */

body::before{
  content:"";
  position:fixed;
  top:-180px;
  right:-180px;
  width:500px;
  height:500px;
  background:rgba(62,207,142,0.10);
  filter:blur(120px);
  border-radius:50%;
  z-index:0;
}

body::after{
  content:"";
  position:fixed;
  bottom:-180px;
  left:-180px;
  width:400px;
  height:400px;
  background:rgba(62,207,142,0.08);
  filter:blur(120px);
  border-radius:50%;
  z-index:0;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:18px;

  background:rgba(255,255,255,0.85);

  backdrop-filter:blur(12px);

  border-bottom:1px solid var(--border);

  font-size:24px;
  font-weight:700;
  color:var(--primary);
}

/* BACK */

.back-btn{
  position:absolute;
  left:18px;

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:14px;

  background:white;

  border:1px solid var(--border);

  cursor:pointer;

  transition:0.25s;

  box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

.back-btn:hover{
  background:var(--primary);
  color:white;
}

/* CONTAINER */

.container{
  max-width:1100px;
  margin:auto;
  padding:24px;
  position:relative;
  z-index:2;
}

/* LAYOUT */

.product-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

/* CARD */

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.04);
}

/* IMAGE */

.image-box{
  position:relative;
  background:#f9fafb;
  border-radius:22px;
  overflow:hidden;
}

.image-box img{
  width:100%;
  height:420px;
  object-fit:contain;
  padding:20px;
  transition:0.3s;
}

.image-box img:hover{
  transform:scale(1.04);
}

/* RATING */

.rating{
  position:absolute;
  top:16px;
  right:16px;

  background:var(--primary);

  color:white;

  padding:8px 14px;

  border-radius:999px;

  font-size:13px;
  font-weight:600;
}

/* TITLE */

h2{
  margin-top:0;
  font-size:28px;
  line-height:1.5;
}

/* PRICE */

.price{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 18px;

  margin-top:14px;

  border-radius:18px;

  background:#f8faf9;

  border:1px solid var(--border);

  cursor:pointer;

  transition:0.25s;
}

.price:hover{
  transform:translateY(-2px);
}

.price.best{
  background:rgba(62,207,142,0.10);
  border:1px solid rgba(62,207,142,0.25);
}

/* BUY */

.buy-btn{
  margin-top:22px;

  padding:16px;

  text-align:center;

  border-radius:18px;

  background:var(--primary);

  color:white;

  font-weight:600;

  cursor:pointer;

  transition:0.25s;
}

.buy-btn:hover{
  background:var(--primary-dark);
}

/* TAG */

.tag{
  display:inline-block;

  padding:10px 14px;

  margin:6px;

  border-radius:14px;

  background:#ecfdf5;

  color:#15803d;

  font-size:13px;
  font-weight:600;
}

/* MODERN GRAPH */

.graph-box{
  margin-top:24px;

  background:rgba(255,255,255,0.9);

  backdrop-filter:blur(18px);

  border:1px solid rgba(62,207,142,0.12);

  border-radius:28px;

  padding:24px;

  position:relative;

  overflow:hidden;

  box-shadow:
    0 10px 35px rgba(62,207,142,0.08);
}

.graph-box::before{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  background:rgba(62,207,142,0.08);
  filter:blur(90px);
  top:-80px;
  right:-80px;
  border-radius:50%;
}

.graph-box h3{
  margin-top:0;
  margin-bottom:22px;
  font-size:20px;
}

canvas{
  width:100% !important;
  max-height:320px !important;
}

/* ERROR */

.error{
  text-align:center;
  padding:60px 20px;
  color:#ef4444;
  font-size:20px;
  font-weight:600;
}

/* MOBILE */

@media(max-width:850px){

  .product-layout{
    grid-template-columns:1fr;
  }

  .image-box img{
    height:300px;
  }

}

@media(max-width:600px){

  .container{
    padding:14px;
  }

  .card{
    padding:18px;
  }

  h2{
    font-size:22px;
  }

  header{
    font-size:20px;
  }

}

</style>
</head>

<body>

<header>

  <div class="back-btn" onclick="goBack()">
    ←
  </div>

  Product Details

</header>

<div class="container" id="main"></div>

<script>

const id = localStorage.getItem("productId");

function goBack(){

  if(window.history.length > 1){

    window.history.back();

  }else{

    window.location.href = "homepage.html";

  }

}

async function loadProduct(){

  try{

    let res = await fetch(
      `https://visco.onrender.com/product/${id}`
    );

    let p = await res.json();

    if(!p || p.error){

      document.getElementById("main").innerHTML = `
        <div class="error">
          ❌ Product not found
        </div>
      `;

      return;
    }

    const links = {
      amazon:p.amazon_link,
      flipkart:p.flipkart_link
    };

    const nameMap = {
      amazon:"Amazon",
      flipkart:"Flipkart"
    };

    let keys = [];
    let values = [];

    let min = Infinity;
    let bestKey = "";

    for(let k in nameMap){

      if(p[k] && p[k] > 0){

        if(p[k] < min){

          min = p[k];
          bestKey = k;

        }

      }

    }

    let priceHTML = "";

    for(let k in nameMap){

      if(p[k] && p[k] > 0){

        let isBest =
          k === bestKey
          ? "best"
          : "";

        priceHTML += `

          <div
            class="price ${isBest}"
            onclick="window.open('${links[k]}')"
          >

            <span>🛒 ${nameMap[k]}</span>

            <strong>₹${p[k]}</strong>

          </div>

        `;

        keys.push(nameMap[k]);
        values.push(p[k]);

      }

    }

    document.getElementById("main").innerHTML = `

      <div class="product-layout">

        <div class="card">

          <div class="image-box">

            <img src="${p.image}">

            <div class="rating">
              ⭐ ${p.rating || 0}
            </div>

          </div>

        </div>

        <div>

          <div class="card">

            <h2>${p.name}</h2>

            ${priceHTML}

            <div
              class="buy-btn"
              onclick="window.open('${links[bestKey]}')"
            >
              🚀 Buy Now at Best Price
            </div>

          </div>

          <div class="graph-box">

            <h3>📊 Price Comparison</h3>

            <canvas id="priceChart"></canvas>

          </div>

          <div class="graph-box">

            <h3>📈 Rating Overview</h3>

            <canvas id="ratingChart"></canvas>

          </div>

        </div>

      </div>

    `;

    // PRICE CHART

    const priceCtx =
    document.getElementById("priceChart");

    const gradient =
    priceCtx.getContext("2d")
    .createLinearGradient(0,0,0,300);

    gradient.addColorStop(
      0,
      "rgba(62,207,142,0.95)"
    );

    gradient.addColorStop(
      1,
      "rgba(62,207,142,0.15)"
    );

    new Chart(priceCtx,{

      type:"bar",

      data:{

        labels:keys,

        datasets:[{

          data:values,

          backgroundColor:gradient,

          borderRadius:18,

          borderSkipped:false

        }]
      },

      options:{

        responsive:true,

        animation:{
          duration:1800
        },

        plugins:{

          legend:{
            display:false
          },

          tooltip:{
            backgroundColor:"#111827",
            titleColor:"#3ecf8e",
            bodyColor:"#fff",
            padding:14,
            cornerRadius:14
          }

        },

        scales:{

          x:{
            grid:{
              display:false
            },
            ticks:{
              color:"#6b7280"
            }
          },

          y:{
            grid:{
              color:"#e5e7eb"
            },
            ticks:{
              color:"#6b7280"
            }
          }

        }

      }

    });

    // RATING CHART

    const ratingCtx =
    document.getElementById("ratingChart");

    const lineGradient =
    ratingCtx.getContext("2d")
    .createLinearGradient(0,0,0,280);

    lineGradient.addColorStop(
      0,
      "rgba(62,207,142,0.35)"
    );

    lineGradient.addColorStop(
      1,
      "rgba(62,207,142,0.02)"
    );

    new Chart(ratingCtx,{

      type:"line",

      data:{

        labels:keys,

        datasets:[{

          data:keys.map(
            () => p.rating || 0
          ),

          fill:true,

          tension:0.45,

          borderWidth:4,

          borderColor:"#3ecf8e",

          backgroundColor:lineGradient,

          pointBackgroundColor:"#2eb67d",

          pointBorderColor:"#fff",

          pointBorderWidth:3,

          pointRadius:6

        }]
      },

      options:{

        responsive:true,

        animation:{
          duration:2000
        },

        plugins:{

          legend:{
            display:false
          },

          tooltip:{
            backgroundColor:"#111827",
            titleColor:"#3ecf8e",
            bodyColor:"#fff",
            padding:14,
            cornerRadius:14
          }

        },

        scales:{

          x:{
            grid:{
              display:false
            },
            ticks:{
              color:"#6b7280"
            }
          },

          y:{
            min:0,
            max:5,

            grid:{
              color:"#e5e7eb"
            },

            ticks:{
              color:"#6b7280"
            }
          }

        }

      }

    });

  }catch(err){

    console.error(err);

    document.getElementById("main").innerHTML = `
      <div class="error">
        ⚠️ Backend not running
      </div>
    `;

  }

}

loadProduct();

</script>

</body>
</html>
