<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Visco Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{

  --primary:#3ecf8e;
  --primary-dark:#2eb67d;

  --bg:#f8faf9;
  --card:#ffffff;

  --text:#111827;
  --muted:#6b7280;

  --border:#e5e7eb;

  --shadow:rgba(0,0,0,0.06);

}

/* =========================
   BODY
========================= */

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

/* GLOW EFFECTS */

body::before{
  content:"";
  position:fixed;
  top:-180px;
  right:-180px;
  width:500px;
  height:500px;
  background:rgba(62,207,142,0.10);
  filter:blur(120px);
  border-radius:50%;
  z-index:0;
}

body::after{
  content:"";
  position:fixed;
  bottom:-180px;
  left:-180px;
  width:400px;
  height:400px;
  background:rgba(62,207,142,0.08);
  filter:blur(120px);
  border-radius:50%;
  z-index:0;
}

/* =========================
   HEADER
========================= */

header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:18px;

  background:rgba(255,255,255,0.85);

  backdrop-filter:blur(12px);

  border-bottom:1px solid var(--border);

  font-size:24px;
  font-weight:700;
  color:var(--primary);
}

/* =========================
   BACK BUTTON
========================= */

.back-btn{
  position:absolute;
  left:18px;

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:14px;

  background:white;

  border:1px solid var(--border);

  cursor:pointer;

  transition:0.25s;

  box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

.back-btn:hover{
  transform:translateY(-2px);
  background:var(--primary);
  color:white;
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
  position:relative;
  z-index:2;
}

/* =========================
   PRODUCT LAYOUT
========================= */

.product-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  align-items:start;
}

/* =========================
   CARD
========================= */

.card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:28px;

  padding:24px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.04);

  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);

  box-shadow:
    0 20px 40px rgba(62,207,142,0.08);
}

/* =========================
   IMAGE
========================= */

.image-box{
  position:relative;
  background:#f9fafb;
  border-radius:22px;
  overflow:hidden;
}

.image-box img{
  width:100%;
  height:420px;
  object-fit:contain;
  padding:20px;
  transition:0.3s;
}

.image-box img:hover{
  transform:scale(1.04);
}

/* =========================
   RATING
========================= */

.rating{
  position:absolute;
  top:16px;
  right:16px;

  background:var(--primary);

  color:white;

  padding:8px 14px;

  border-radius:999px;

  font-size:13px;
  font-weight:600;

  box-shadow:
    0 6px 20px rgba(62,207,142,0.25);
}

/* =========================
   TITLE
========================= */

h2{
  font-size:28px;
  line-height:1.5;
  margin-top:0;
}

/* =========================
   PRICE BOX
========================= */

.price{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 18px;

  margin-top:14px;

  border-radius:18px;

  background:#f8faf9;

  border:1px solid var(--border);

  cursor:pointer;

  transition:0.25s;

  font-weight:500;
}

.price:hover{
  transform:translateY(-2px);
}

.price.best{
  background:rgba(62,207,142,0.10);
  border:1px solid rgba(62,207,142,0.25);
}

/* =========================
   BUY BUTTON
========================= */

.buy-btn{
  margin-top:22px;

  padding:16px;

  text-align:center;

  border-radius:18px;

  background:var(--primary);

  color:white;

  font-size:16px;
  font-weight:600;

  cursor:pointer;

  transition:0.25s;
}

.buy-btn:hover{
  background:var(--primary-dark);
  transform:translateY(-2px);
}

/* =========================
   TAGS
========================= */

.tag{
  display:inline-block;

  padding:10px 14px;

  margin:6px;

  border-radius:14px;

  background:#ecfdf5;

  color:#15803d;

  font-size:13px;
  font-weight:600;
}

/* =========================
   CHART BOX
========================= */

.graph-box{
  margin-top:22px;

  background:white;

  border:1px solid var(--border);

  border-radius:24px;

  padding:22px;

  box-shadow:
    0 8px 24px rgba(0,0,0,0.04);
}

.graph-box h3{
  margin-top:0;
  margin-bottom:18px;
}

/* =========================
   ERROR
========================= */

.error{
  text-align:center;
  padding:60px 20px;
  color:#ef4444;
  font-size:20px;
  font-weight:600;
}

/* =========================
   MOBILE
========================= */

@media(max-width:850px){

  .product-layout{
    grid-template-columns:1fr;
  }

  .image-box img{
    height:300px;
  }

}

@media(max-width:600px){

  .container{
    padding:14px;
  }

  .card{
    padding:18px;
    border-radius:22px;
  }

  h2{
    font-size:22px;
  }

  header{
    font-size:20px;
  }

}

</style>
</head>

<body>

<header>

  <div class="back-btn" onclick="goBack()">
    ←
  </div>

  Product Details

</header>

<div class="container" id="main"></div>

<script>

const id = localStorage.getItem("productId");

function goBack(){

  if(window.history.length > 1){

    window.history.back();

  }else{

    window.location.href = "homepage.html";

  }

}

async function loadProduct(){

  try{

    let res = await fetch(
      `https://visco.onrender.com/product/${id}`
    );

    let p = await res.json();

    if(!p || p.error){

      document.getElementById("main").innerHTML = `
        <div class="error">
          ❌ Product not found
        </div>
      `;

      return;
    }

    const links = {
      amazon:p.amazon_link,
      flipkart:p.flipkart_link
    };

    const nameMap = {
      amazon:"Amazon",
      flipkart:"Flipkart"
    };

    let keys = [];
    let values = [];

    let min = Infinity;
    let bestKey = "";

    for(let k in nameMap){

      if(p[k] && p[k] > 0){

        if(p[k] < min){

          min = p[k];
          bestKey = k;

        }

      }

    }

    let priceHTML = "";

    for(let k in nameMap){

      if(p[k] && p[k] > 0){

        let isBest =
          k === bestKey
          ? "best"
          : "";

        priceHTML += `

          <div
            class="price ${isBest}"
            onclick="window.open('${links[k]}')"
          >

            <span>
              🛒 ${nameMap[k]}
            </span>

            <strong>
              ₹${p[k]}
            </strong>

          </div>

        `;

        keys.push(nameMap[k]);
        values.push(p[k]);

      }

    }

    function getDetails(p){

      if(p.category === "electronics"){

        return `

          <div class="graph-box">

            <h3>📦 Delivery & Warranty</h3>

            <div class="tag">
              2-4 Days Delivery
            </div>

            <div class="tag">
              7 Days Replacement
            </div>

            <div class="tag">
              1 Year Warranty
            </div>

            <div class="tag">
              Secure Packaging
            </div>

          </div>

        `;
      }

      if(p.category === "fashion"){

        return `

          <div class="graph-box">

            <h3>👕 Product Details</h3>

            <div class="tag">
              Premium Fabric
            </div>

            <div class="tag">
              Easy Returns
            </div>

            <div class="tag">
              Trendy Design
            </div>

          </div>

        `;
      }

      return "";

    }

    document.getElementById("main").innerHTML = `

      <div class="product-layout">

        <!-- LEFT -->

        <div class="card">

          <div class="image-box">

            <img src="${p.image}">

            <div class="rating">
              ⭐ ${p.rating || 0}
            </div>

          </div>

        </div>

        <!-- RIGHT -->

        <div>

          <div class="card">

            <h2>${p.name}</h2>

            ${priceHTML}

            <div
              class="buy-btn"
              onclick="window.open('${links[bestKey]}')"
            >
              🚀 Buy Now at Best Price
            </div>

          </div>

          ${getDetails(p)}

          <div class="graph-box">

            <h3>📊 Price Comparison</h3>

            <canvas id="priceChart"></canvas>

          </div>

          <div class="graph-box">

            <h3>⭐ Rating Overview</h3>

            <canvas id="ratingChart"></canvas>

          </div>

        </div>

      </div>

    `;

    // PRICE CHART

    new Chart(
      document.getElementById("priceChart"),
      {

        type:'bar',

        data:{

          labels:keys,

          datasets:[{

            label:'Price',

            data:values,

            borderRadius:12,

            borderSkipped:false,

            backgroundColor:'#3ecf8e'

          }]

        },

        options:{

          responsive:true,

          plugins:{

            legend:{
              display:false
            }

          },

          scales:{

            x:{
              grid:{
                display:false
              },
              ticks:{
                color:'#6b7280'
              }
            },

            y:{
              grid:{
                color:'#e5e7eb'
              },
              ticks:{
                color:'#6b7280'
              }
            }

          }

        }

      }
    );

    // RATING CHART

    new Chart(
      document.getElementById("ratingChart"),
      {

        type:'line',

        data:{

          labels:keys,

          datasets:[{

            label:'Rating',

            data:keys.map(() => p.rating || 0),

            fill:true,

            tension:0.4,

            borderColor:'#3ecf8e',

            backgroundColor:'rgba(62,207,142,0.12)',

            pointBackgroundColor:'#2eb67d',

            pointRadius:5

          }]

        },

        options:{

          responsive:true,

          plugins:{

            legend:{
              display:false
            }

          },

          scales:{

            x:{
              grid:{
                display:false
              },
              ticks:{
                color:'#6b7280'
              }
            },

            y:{
              grid:{
                color:'#e5e7eb'
              },
              ticks:{
                color:'#6b7280'
              },
              min:0,
              max:5
            }

          }

        }

      }
    );

  }catch(err){

    console.error(err);

    document.getElementById("main").innerHTML = `
      <div class="error">
        ⚠️ Backend not running
      </div>
    `;

  }

}

loadProduct();

</script>

</body>
</html>
